# Validation workflow for the PRODUCTION Python /strands command (baseline comparison).
# Pinned to upstream @main. Trigger is "/strands " (trailing space) so it does NOT
# collide with the "/strands-ts" workflow. Remove once the comparison is done.
name: Strands Command Handler (Python baseline)

on:
  issue_comment:
    types: [created]

jobs:
  authorization-check:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/strands ') }}
    name: Check access
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      approval-env: ${{ steps.auth.outputs.approval-env }}
    steps:
      - name: Check Authorization
        id: auth
        uses: strands-agents/devtools/authorization-check@main
        with:
          username: ${{ github.event.comment.user.login || 'invalid' }}
          allowed-roles: 'maintain,triage,write,admin'

  setup-and-process:
    needs: [authorization-check]
    environment:
      name: ${{ needs.authorization-check.outputs.approval-env }}
      deployment: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Parse input
        id: parse
        uses: strands-agents/devtools/strands-command/actions/strands-input-parser@main
        with:
          command: ${{ github.event.comment.body }}

  execute-readonly-agent:
    needs: [setup-and-process]
    permissions:
      contents: read
      issues: read
      pull-requests: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run Strands Agent
        id: agent-runner
        uses: strands-agents/devtools/strands-command/actions/strands-agent-runner@main
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          sessions_bucket: ${{ secrets.AGENT_SESSIONS_BUCKET }}
          write_permission: 'false'

  finalize:
    if: ${{ always() && startsWith(github.event.comment.body, '/strands ') }}
    needs: [setup-and-process, execute-readonly-agent]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Execute write operations
        uses: strands-agents/devtools/strands-command/actions/strands-finalize@main
